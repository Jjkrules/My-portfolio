<div class="flex w-full h-screen flex-row items-start h-full">
    <div class="container flex mx-auto max-w-7xl flex-row mt-40">
        <div class="flex max-w-256 flex-col whitespace-nowrap">
            <span class="block text-6xl text-white font-serif ">Hello, my name is <span class="text-6xl text-primary">Jeswin James</span></span>
            <span class="block text-2xl text-neutral-400 mt-2 font-serif">Computer Engineer | Temple Alumni | CS Enthusiast | Secret Clearance</span>
            <span class="block text-xl text-primary mt-12 font-serif">Building the future of tech at <span class="text-pink-500 font-semibold">GreenXT</span></span>
            <span class="block text-xl text-primary mt-1 font-serif">Driven by <span class="text-pink-500 font-semibold">Logic</span> powered by <span class="text-pink-500 font-semibold">Curiosity</span></span>
            <span class="block text-xl text-primary mt-1 font-serif">Always exploring the next breakthrough in <span class="text-pink-500 font-semibold">Computer Science!</span></span>
            <div class="flex mt-16 justify-start items-center">
                <a 
                class="flex bg-gradient-to-r from-[var(--color-primary)] to-[var(--color-tertiary)] font-black w-fit h-16 rounded-2xl pl-12 pr-12 font-serif animate-gradient cursor-pointer items-center"
                href="/assets/jamesResumeQ2.pdf" 
                target="_blank" 
                rel="noopener noreferrer"
                >
                View Resume</a>
                <button 
                (click)="appearSocials()"
                class="flex bg-black text-secondary font-black border-2 w-38 h-16 ml-4 rounded-2xl pl-8 pr-8 font-serif cursor-pointer btn-anim items-center"
                rel="noopener noreferrer"
                >
                Contact Me</button>
                <div 
                class="flex w-fit justify-center opacity-0 transition-opacity duration-1500"
                [class.opacity-100]="socialsVisible"
                [class.pointer-events-none]="!socialsVisible"
                id="socialContainer"
                >
                    <a href="mailto:Jeswin2802@gmail.com" target="_blank" rel="noopener noreferrer" class="ml-4 pointer-cursor">
                        <lucide-icon [img]="icons.Mail" class="size-10 stroke-[#A855F7]"></lucide-icon>
                    </a>
                    <a href="https://github.com/Jjkrules" target="_blank" rel="noopener noreferrer"  class="pointer-cursor">
                        <img 
                            src="https://cdn.simpleicons.org/github/A855F7" 
                            class="size-10 ml-4" 
                            alt="GitHub" 
                        />
                    </a>
                    <a href="https://www.linkedin.com/in/jeswin-james-9508b21bb/" target="_blank" rel="noopener noreferrer" class="pointer-cursor">
                        <svg 
                            xmlns="http://www.w3.org/2000/svg" 
                            viewBox="0 0 24 24" 
                            class="size-10 fill-[#A855F7] transition-all ml-4">
                            <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                        </svg>
                    </a>
                </div>
            </div>
        </div>
        <div class="flex ml-auto">
            <div 
            class="flex w-128 h-128 rounded-full ring-8 ring-white overflow-hidden border-white-20 animate-glow">
                <img src="/pfp.png" class="w-full h-full object-cover">
            </div>
        </div>
        <div class="flex absolute bottom-32 left-1/2 -translate-x-1/2 flex-col justify-center items-center gap-2 font-serif animate-bounce">
            <span class="text-white">SCROLL DOWN</span>
            <div class="rounded-full border-primary border-2">
                <a>
                    <lucide-icon [img]="icons.ChevronsDown" class="w-8 h-8 stroke-primary"></lucide-icon>
                </a>
            </div>
        </div>
    </div>
</div>
